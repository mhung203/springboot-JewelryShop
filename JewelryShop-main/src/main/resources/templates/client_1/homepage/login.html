<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #d4af37;
            --secondary-color: #f8f5e6;
            --accent-color: #2c2c2c;
            --light-color: #ffffff;
            --dark-color: #1a1a1a;
            --text-color: #333333;
            --border-radius: 12px;
            --error-color: #dc3545;
            --success-color: #28a745;
        }

        body {
            background: linear-gradient(135deg, #f9f7f0 0%, #f0ece1 100%);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
        }

        /* Left Side - Banner */
        .login-banner {
            flex: 1;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.95) 0%, rgba(212, 175, 55, 0.95) 100%),
            url('https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=800') center/cover;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            position: relative;
        }

        .login-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 50%, rgba(212, 175, 55, 0.3) 0%, transparent 60%);
        }

        .banner-content {
            position: relative;
            z-index: 2;
        }

        .banner-logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .banner-logo span {
            color: var(--primary-color);
        }

        .banner-title {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .banner-description {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .banner-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Right Side - Form */
        .login-form-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #666;
            font-size: 15px;
        }

        .form-subtitle a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .form-subtitle a:hover {
            text-decoration: underline;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 8px;
        }

        .form-label .required {
            color: var(--error-color);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .form-input.error {
            border-color: var(--error-color);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #f4d47c 100%);
            color: var(--dark-color);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Back to Home */
        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* Quick Login Demo */
        .quick-login {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 10px;
            font-size: 13px;
            color: #1565c0;
            text-align: center;
        }

        .quick-login strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .quick-login-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .quick-login-btn:hover {
            background: #1565c0;
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .login-container {
                flex-direction: column;
            }

            .login-banner {
                padding: 40px 30px;
                min-height: 350px;
            }

            .banner-logo {
                font-size: 32px;
            }

            .banner-title {
                font-size: 26px;
            }

            .login-form-section {
                padding: 40px 30px;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 20px 10px;
            }

            .login-banner {
                padding: 30px 20px;
            }

            .login-form-section {
                padding: 30px 20px;
            }

            .form-title {
                font-size: 26px;
            }

            .social-login {
                flex-direction: column;
            }

            .back-home {
                top: 15px;
                left: 15px;
                padding: 8px 15px;
                font-size: 13px;
            }

            .banner-stats {
                grid-template-columns: 1fr;
            }
        }

        /* Loading State */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 300px;
            padding: 16px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast.hiding {
            animation: slideOut 0.3s ease forwards;
        }

        .toast::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .toast.success::before {
            background: #28a745;
        }

        .toast.error::before {
            background: #dc3545;
        }

        .toast.info::before {
            background: #17a2b8;
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            color: white;
        }

        .toast.success .toast-icon {
            background: #28a745;
        }

        .toast.error .toast-icon {
            background: #dc3545;
        }

        .toast.info .toast-icon {
            background: #17a2b8;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
            color: var(--dark-color);
        }

        .toast-message {
            font-size: 13px;
            color: #666;
        }

        .toast-close {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .toast-close:hover {
            color: #333;
        }

        /* Thêm vào phần CSS hiện có */
        .form-input.is-valid {
            border-color: #28a745 !important;
            box-shadow: 0 0 0 2px rgba(40, 167, 69, 0.1) !important;
        }

        .form-input.error {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.1) !important;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<div class="login-container">
    <!-- Left Side - Banner -->
    <div class="login-banner">
        <a th:href="@{/}" class="back-home">
            <i class="fas fa-arrow-left"></i> Trang chủ
        </a>

        <div class="banner-content">
            <div class="banner-logo">LUXURY<span>GEMS</span></div>
            <h2 class="banner-title">Chào mừng trở lại!</h2>
            <p class="banner-description">
                Đăng nhập để tiếp tục trải nghiệm mua sắm trang sức cao cấp
                với những ưu đãi độc quyền dành riêng cho bạn.
            </p>

            <div class="banner-stats">
                <div class="stat-item">
                    <div class="stat-number">50K+</div>
                    <div class="stat-label">Khách hàng</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">5000+</div>
                    <div class="stat-label">Sản phẩm</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">98%</div>
                    <div class="stat-label">Hài lòng</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">4.9★</div>
                    <div class="stat-label">Đánh giá</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Side - Form -->
    <div class="login-form-section">
        <div class="form-header">
            <h1 class="form-title">Đăng Nhập</h1>
            <p class="form-subtitle">
                Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
            </p>
        </div>

        <!-- Form Spring Security -->
        <form th:action="@{/login}" method="POST" id="loginForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Email/Phone -->
            <div class="form-group">
                <label class="form-label">Email/Số điện thoại<span class="required">*</span></label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-user"></i>
                    <input type="text" name="username" class="form-input" placeholder="Email/Số điện thoại" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label">Mật khẩu<span class="required">*</span></label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-lock"></i>
                    <input id="passwordField" type="password" name="password" class="form-input" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('passwordField')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Remember & Forgot -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember-me" id="rememberMe">
                    <span>Ghi nhớ đăng nhập</span>
                </label>
                <a th:href="@{/forgot-password}" class="forgot-password">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Đăng nhập</span>
            </button>
        </form>
    </div>
</div>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/auth-service.js}"></script>
<script th:src="@{/js/auth-ui.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
