<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Quên Mật Khẩu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #d4af37;
            --secondary-color: #f8f5e6;
            --accent-color: #2c2c2c;
            --light-color: #ffffff;
            --dark-color: #1a1a1a;
            --text-color: #333333;
            --border-radius: 12px;
            --error-color: #dc3545;
            --success-color: #28a745;
        }

        body {
            background: linear-gradient(135deg, #f9f7f0 0%, #f0ece1 100%);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
        }

        /* Left Side - Banner */
        .login-banner {
            flex: 1;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.95) 0%, rgba(212, 175, 55, 0.95) 100%),
            url('https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=800') center/cover;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            position: relative;
        }

        .login-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 50%, rgba(212, 175, 55, 0.3) 0%, transparent 60%);
        }

        .banner-content {
            position: relative;
            z-index: 2;
        }

        .banner-logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .banner-logo span {
            color: var(--primary-color);
        }

        .banner-title {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .banner-description {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .banner-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Right Side - Form */
        .login-form-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #666;
            font-size: 15px;
        }

        .form-subtitle a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .form-subtitle a:hover {
            text-decoration: underline;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 8px;
        }

        .form-label .required {
            color: var(--error-color);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .form-input.error {
            border-color: var(--error-color);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #f4d47c 100%);
            color: var(--dark-color);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Back to Home/Login */
        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* Responsive adjustments (giữ nguyên) */
        @media (max-width: 992px) {
            .login-container { flex-direction: column; }
            .login-banner { padding: 40px 30px; min-height: 350px; }
            .login-form-section { padding: 40px 30px; }
            .banner-logo { font-size: 32px; }
            .banner-title { font-size: 26px; }
        }

        @media (max-width: 576px) {
            .banner-stats { grid-template-columns: 1fr; }
        }

        /* Thêm vào cuối thẻ <style> của bạn */

        /* ========================================
           TOAST NOTIFICATION STYLES
           ======================================== */

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 300px;
            padding: 16px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast.hiding {
            animation: slideOut 0.3s ease forwards;
        }

        /* Thanh màu bên trái dựa trên loại Toast */
        .toast::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        /* Định nghĩa màu sắc cho thanh bên trái */
        .toast.success::before {
            background: var(--success-color); /* Xanh lá */
        }

        .toast.error::before {
            background: var(--error-color); /* Đỏ */
        }

        .toast.info::before {
            background: #17a2b8; /* Xanh da trời */
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Định nghĩa màu sắc cho icon */
        .toast.success .toast-icon {
            background: var(--success-color);
        }

        .toast.error .toast-icon {
            background: var(--error-color);
        }

        .toast.info .toast-icon {
            background: #17a2b8;
        }

        /* Cập nhật icon Fa-Font dựa trên loại toast */
        .toast.success .toast-icon i::before { content: "\f058"; }
        .toast.error .toast-icon i::before { content: "\f057";}
        .toast.info .toast-icon i::before { content: "\f05a"; }


        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
            color: var(--dark-color);
        }

        .toast-message {
            font-size: 13px;
            color: #666;
        }

        .toast-close {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .toast-close:hover {
            color: #333;
        }
    </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="login-container">
    <div class="login-banner">
        <a th:href="@{/login}" class="back-home">
            <i class="fas fa-arrow-left"></i> Quay lại Đăng nhập
        </a>

        <div class="banner-content">
            <div class="banner-logo">LUXURY<span>GEMS</span></div>
            <h2 class="banner-title">Quên Mật Khẩu?</h2>
            <p class="banner-description">
                Đừng lo lắng! Hãy đặt lại mật khẩu để tiếp tục trải nghiệm mua sắm trang sức cao cấp.
            </p>
            <div class="banner-stats">
                <div class="stat-item"><div class="stat-number">50K+</div><div class="stat-label">Khách hàng</div></div>
                <div class="stat-item"><div class="stat-number">5000+</div><div class="stat-label">Sản phẩm</div></div>
                <div class="stat-item"><div class="stat-number">98%</div><div class="stat-label">Hài lòng</div></div>
                <div class="stat-item"><div class="stat-number">4.9★</div><div class="stat-label">Đánh giá</div></div>
            </div>
        </div>
    </div>

    <div class="login-form-section">
        <div class="form-header">
            <h1 class="form-title" id="formMainTitle">Quên Mật Khẩu</h1>
            <p class="form-subtitle">
                <span id="formSubText">Vui lòng nhập email của bạn để bắt đầu.</span>
            </p>
        </div>

        <div th:if="${error}" class="error-message show" style="margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Lỗi từ server.</span>
        </div>

        <form th:action="@{/forgot-password}" method="POST" id="resetPasswordForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div id="step-email-otp">
                <div class="form-group">
                    <label class="form-label">Email<span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-envelope"></i>
                        <input type="email" name="email" id="emailField" class="form-input"
                               placeholder="Địa chỉ Email của bạn" th:value="${email}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Mã xác minh (OTP)</label>
                    <div class="input-wrapper" style="display: flex; gap: 10px;">
                        <input type="text" name="otp" id="otpField" class="form-input"
                               placeholder="Nhập 6 số OTP" maxlength="6" disabled required style="padding-left: 15px;">
                        <button type="button" id="sendOtpBtn" class="submit-btn" style="width: 150px; flex-shrink: 0;">
                            <span id="otpTimer">Gửi OTP</span>
                        </button>
                    </div>
                    <div id="otpError" class="error-message"></div>
                </div>

                <button type="button" class="submit-btn" id="verifyOtpBtn" disabled>
                    <i class="fas fa-key"></i> Xác minh OTP
                </button>
            </div>

            <div id="step-new-password" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Mật khẩu mới (Tối thiểu 8 ký tự)<span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-lock"></i>
                        <input id="newPasswordField" type="password" name="password" class="form-input"
                               placeholder="Tối thiểu 8 ký tự" required disabled>
                        <button type="button" class="toggle-password" onclick="togglePassword('newPasswordField')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Xác nhận mật khẩu<span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-lock"></i>
                        <input id="confirmPasswordField" type="password" name="confirmPassword"
                               class="form-input" placeholder="Xác nhận mật khẩu mới" required disabled>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPasswordField')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="passwordMismatchError" class="error-message" style="color: var(--error-color);">
                        <i class="fas fa-times-circle"></i> Mật khẩu xác nhận không khớp.
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="finalResetBtn" disabled>
                    <i class="fas fa-sync"></i>
                    <span>Đặt lại Mật khẩu</span>
                </button>
            </div>

        </form>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const passwordField = document.getElementById('newPasswordField');
        const confirmField = document.getElementById('confirmPasswordField');
        const mismatchError = document.getElementById('passwordMismatchError');
        const form = document.getElementById('resetPasswordForm');

        function validatePasswords() {
            const isValid = passwordField.value === confirmField.value;

            if (!isValid) {
                mismatchError.classList.add('show');
                confirmField.classList.add('error');
            } else {
                mismatchError.classList.remove('show');
                confirmField.classList.remove('error');
            }
            return isValid;
        }

        // Kiểm tra khớp mật khẩu khi gõ
        [passwordField, confirmField].forEach(field => {
            field.addEventListener('input', validatePasswords);
        });

        form.addEventListener('submit', function(e) {
            if (!validatePasswords()) {
                e.preventDefault();
            }
        });

        const submitBtn = document.getElementById('resetBtn');
        submitBtn.addEventListener('click', function() {
            if (validatePasswords()) {
                submitBtn.classList.add('btn-loading');
            }
        });
    });


    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.nextElementSibling.querySelector('i');

        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        // CSRF Tokens
        const CSRF_TOKEN = document.querySelector('meta[name="_csrf"]').content;
        const CSRF_HEADER_NAME = document.querySelector('meta[name="_csrf_header"]').content;

        // DOM ELEMENTS
        const emailField = document.getElementById('emailField');
        const otpField = document.getElementById('otpField');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const otpTimerSpan = document.getElementById('otpTimer');
        const otpError = document.getElementById('otpError');
        const stepEmailOtp = document.getElementById('step-email-otp');
        const stepNewPassword = document.getElementById('step-new-password');
        const newPasswordField = document.getElementById('newPasswordField');
        const confirmPasswordField = document.getElementById('confirmPasswordField');
        const finalResetBtn = document.getElementById('finalResetBtn');
        const title = document.getElementById('formMainTitle');
        const subText = document.getElementById('formSubText');

        let otpCountdown = 0;
        let timerInterval = null;
        let isOtpVerified = false;

        if (emailField.value) verifyOtpBtn.disabled = false;


        function validatePasswords() {
            const isMatch = newPasswordField.value === confirmPasswordField.value;
            const isLongEnough = newPasswordField.value.length >= 8;
            const mismatchError = document.getElementById('passwordMismatchError');

            if (!isMatch) {
                mismatchError.classList.add('show');
                confirmPasswordField.classList.add('error');
            } else {
                mismatchError.classList.remove('show');
                confirmPasswordField.classList.remove('error');
            }

            finalResetBtn.disabled = !(isMatch && isLongEnough && isOtpVerified);
            return isMatch && isLongEnough;
        }

        [newPasswordField, confirmPasswordField].forEach(field => {
            field.addEventListener('input', validatePasswords);
        });

        function startTimer() {
            otpCountdown = 60;
            sendOtpBtn.disabled = true;
            otpField.disabled = false;
            verifyOtpBtn.disabled = false;

            timerInterval = setInterval(() => {
                if (otpCountdown <= 0) {
                    clearInterval(timerInterval);
                    otpTimerSpan.textContent = "Gửi lại";
                    sendOtpBtn.disabled = false;
                    showToast('error', 'Hết hạn', 'Mã OTP đã hết hạn.');
                } else {
                    otpTimerSpan.textContent = `Gửi lại (${otpCountdown}s)`;
                    otpCountdown--;
                }
            }, 1000);
        }

        sendOtpBtn.addEventListener('click', async () => {
            const email = emailField.value.trim();
            if (!email) {
                showToast('error', 'Lỗi', 'Vui lòng nhập email.');
                emailField.classList.add('error');
                return;
            }

            sendOtpBtn.classList.add('btn-loading');
            otpError.textContent = '';

            try {
                const res = await fetch('/forgot-password/send-otp', {
                    method: 'POST',
                    headers: {
                        [CSRF_HEADER_NAME]: CSRF_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await res.json();

                if (res.ok && data.ok) {
                    startTimer();
                    showToast('success', 'Thành công', 'Mã OTP đã được gửi qua email.');
                    emailField.disabled = true;
                } else {
                    otpError.textContent = data.error || 'Lỗi gửi OTP.';
                    showToast('error', 'Lỗi', data.error || 'Không tìm thấy email.');
                }
            } catch (e) {
                otpError.textContent = 'Lỗi mạng hoặc server.';
                showToast('error', 'Lỗi', 'Không thể kết nối đến server.');
            } finally {
                sendOtpBtn.classList.remove('btn-loading');
            }
        });

        // ===================================
        // C. XÁC MINH OTP (API CALL: /auth/verify-otp)
        // ===================================
        verifyOtpBtn.addEventListener('click', async () => {
            const email = emailField.value.trim();
            const otp = otpField.value.trim();

            if (otp.length !== 6 || otpCountdown <= 0) {
                otpError.textContent = 'Mã OTP không hợp lệ hoặc đã hết hạn.';
                return;
            }

            verifyOtpBtn.classList.add('btn-loading');

            try {
                const res = await fetch('/forgot-password/verify-otp', {
                    method: 'POST',
                    headers: {
                        [CSRF_HEADER_NAME]: CSRF_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, otp: otp })
                });

                const data = await res.json();

                if (res.ok && data.verified) {
                    isOtpVerified = true;
                    clearInterval(timerInterval);
                    showToast('success', 'Thành công', 'Xác minh OTP thành công!');

                    stepEmailOtp.style.display = 'none';
                    stepNewPassword.style.display = 'block';
                    newPasswordField.disabled = false;
                    confirmPasswordField.disabled = false;
                    finalResetBtn.disabled = false;
                    title.textContent = 'Đặt lại Mật khẩu';
                    subText.textContent = 'Nhập mật khẩu mới của bạn.';

                } else {
                    otpError.textContent = data.error || 'Mã OTP không chính xác.';
                    showToast('error', 'Lỗi', data.error || 'Mã xác minh không chính xác.');
                }
            } catch (e) {
                otpError.textContent = 'Lỗi mạng hoặc server.';
            } finally {
                verifyOtpBtn.classList.remove('btn-loading');
            }
        });

        if (document.querySelector('.error-message.show')) {
            title.textContent = 'Lỗi Xác minh';
            subText.textContent = 'Vui lòng kiểm tra email và thử lại.';
        }
    });

    /**
     * Hàm hiển thị Toast Notification
     * @param {string} type - 'success', 'error', 'info'
     * @param {string} title - Tiêu đề
     * @param {string} message - Nội dung
     */
    function showToast(type, title, message) {
        const container = document.getElementById('toastContainer');
        if (!container) return; // Đảm bảo container tồn tại

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <div class="toast-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="toast-content">
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            </div>
            <button class="toast-close" onclick="this.closest('.toast').remove()">
                <i class="fas fa-times"></i>
            </button>
        `;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('hiding');
            toast.addEventListener('animationend', () => toast.remove());
        }, 3000);
    }
</script>
</body>
</html>
