<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/manager.css}">
    <style>
        .price-input {
            width: 150px;
            text-align: right;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .price-input:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        .price-input.changed {
            background-color: #fff3cd;
            border-color: #ffc107;
        }
        .save-all-btn {
            position: sticky;
            bottom: 20px;
            z-index: 1000;
        }
    </style>
</head>

<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{manager/layout/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <div class="main-content">
        <div th:replace="~{manager/layout/header :: header}"></div>

        <main class="p-4 flex-grow-1 bg-light">
            <h3 class="mb-4 fw-bold text-primary">Danh sách sản phẩm</h3>

            <!-- 🔍 Thanh tìm kiếm -->
            <div class="d-flex justify-content-between mb-3">
                <form class="d-flex gap-2" th:action="@{/manager/products}" method="get">
                    <input type="text" name="keyword" class="form-control"
                           th:value="${keyword}" placeholder="🔍 Tìm theo tên, mã hoặc thương hiệu...">
                    <button type="submit" class="btn btn-primary">Tìm</button>
                    <a th:href="@{/manager/products}" class="btn btn-outline-secondary">Reset</a>
                </form>
                <a th:href="@{/manager/products/form}" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Thêm sản phẩm
                </a>
            </div>

            <!-- ✅ Form cập nhật giá hàng loạt -->
            <form id="bulkPriceForm" th:action="@{/manager/products/update-prices}" method="post">

                <!-- 📋 Bảng danh sách -->
                <div class="table-responsive bg-white shadow-sm rounded">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width: 50px;">STT</th>
                            <th>Tên sản phẩm</th>
                            <th style="width: 80px;">Hình</th>
                            <th style="width: 150px;">Giá hiện tại</th>
                            <th style="width: 180px;">
                                <i class="bi bi-pencil-square text-warning"></i> Giá mới
                            </th>
                            <th>Tồn kho</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="p, stat : ${products}">
                            <td th:text="${stat.index + 1 + (currentPage - 1) * 5}"></td>

                            <!-- 🧾 Tên sản phẩm -->
                            <td>
                                <strong th:text="${p.displayName}"></strong><br>
                                <small class="text-muted" th:text="'Mã: ' + ${p.serialNumber}"></small>
                            </td>

                            <!-- 🖼️ Hình ảnh -->
                            <td>
                                <img th:if="${p.imageUrls != null and !p.imageUrls.isEmpty()}"
                                     th:src="@{${p.imageUrls[0]}}"
                                     alt="Product"
                                     class="img-thumbnail"
                                     style="width: 60px; height: 60px; object-fit: cover;">
                                <div th:if="${p.imageUrls == null or p.imageUrls.isEmpty()}"
                                     class="bg-light rounded d-flex align-items-center justify-content-center"
                                     style="width: 60px; height: 60px;">
                                    <i class="bi bi-image text-muted"></i>
                                </div>
                            </td>

                            <!-- 💰 Giá hiện tại -->
                            <td>
                                <strong class="text-primary"
                                        th:text="${#numbers.formatInteger(p.price - (p.price * p.discount / 100), 0, 'POINT')} + ' ₫'">
                                </strong>
                                <small class="text-muted d-block" th:if="${p.discount > 0}"
                                       th:text="'(Giảm ' + ${p.discount} + '%)'"></small>

                            </td>

                            <!-- ✏️ Input giá mới -->
                            <td>
                                <input type="hidden" name="productIds" th:value="${p.id}">
                                <input type="number"
                                       class="form-control price-input"
                                       name="prices"
                                       th:value="${p.price}"
                                       th:data-original="${p.price}"
                                       min="0" step="1000">

                            </td>

                            <!-- 📦 Tồn kho -->
                            <td>
                                <span th:class="${p.stockQuantity > 10 ? 'badge bg-success' :
                                    (p.stockQuantity > 0 ? 'badge bg-warning text-dark' : 'badge bg-danger')}"
                                      th:text="${p.stockQuantity}"></span>
                            </td>

                            <!-- ⚙️ Thao tác -->
                            <td class="text-center">
                                <button type="button" class="btn-action view"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#detailModal' + ${p.id}"
                                        title="Xem chi tiết">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <a th:href="@{'/manager/products/form/' + ${p.id}}"
                                   class="btn-action edit" title="Chỉnh sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{'/manager/products/delete/' + ${p.id}}"
                                   class="btn-action delete"
                                   onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')"
                                   title="Xóa sản phẩm">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${products == null or products.size() == 0}">
                            <td colspan="7" class="text-center text-muted py-3">
                                <i class="bi bi-inbox me-1"></i> Không có sản phẩm nào
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 💾 Nút lưu giá hàng loạt (sticky ở dưới) -->
                <div class="text-center mt-4 save-all-btn" th:if="${products != null and !products.isEmpty()}">
                    <button type="submit" class="btn btn-warning btn-lg px-5" id="saveAllBtn" disabled>
                        <i class="bi bi-save"></i> Lưu tất cả giá đã thay đổi
                    </button>
                    <span id="changeCount" class="badge bg-secondary ms-2" style="display: none;">0 thay đổi</span>
                </div>
            </form>

            <!-- ✅ Phân trang -->
            <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/manager/products(page=${currentPage - 1}, keyword=${keyword})}">«</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/manager/products(page=${i}, keyword=${keyword})}"
                           th:text="${i}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/manager/products(page=${currentPage + 1}, keyword=${keyword})}">»</a>
                    </li>
                </ul>
            </div>

            <!-- ✅ Modal chi tiết -->
            <div th:if="${products != null}" th:each="p : ${products}">
                <div th:replace="manager/products/detail :: detailModal(p=${p})"></div>
            </div>
        </main>

        <div th:replace="~{manager/layout/footer :: footer}"></div>
    </div>
</div>
<div th:replace="~{manager/layout/manager-chat-sidebar :: chat-sidebar}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ✅ Theo dõi thay đổi giá
    document.addEventListener('DOMContentLoaded', function() {
        const priceInputs = document.querySelectorAll('.price-input');
        const saveBtn = document.getElementById('saveAllBtn');
        const changeCount = document.getElementById('changeCount');

        let changedCount = 0;

        priceInputs.forEach(input => {
            input.addEventListener('input', function() {
                const originalPrice = parseFloat(this.dataset.original);
                const newPrice = parseFloat(this.value);

                // Đánh dấu input đã thay đổi
                if (newPrice !== originalPrice && newPrice > 0) {
                    this.classList.add('changed');
                } else {
                    this.classList.remove('changed');
                }

                // Đếm số lượng thay đổi
                changedCount = document.querySelectorAll('.price-input.changed').length;

                // Hiển thị nút lưu nếu có thay đổi
                if (changedCount > 0) {
                    saveBtn.disabled = false;
                    changeCount.style.display = 'inline-block';
                    changeCount.textContent = changedCount + ' thay đổi';
                } else {
                    saveBtn.disabled = true;
                    changeCount.style.display = 'none';
                }
            });
        });

        // ✅ Xác nhận trước khi submit
        document.getElementById('bulkPriceForm').addEventListener('submit', function(e) {
            const changedInputs = document.querySelectorAll('.price-input.changed');
            if (changedInputs.length === 0) {
                e.preventDefault();
                alert('Không có thay đổi nào để lưu!');
                return false;
            }

            const confirmed = confirm(`Bạn có chắc muốn cập nhật giá cho ${changedInputs.length} sản phẩm?`);
            if (!confirmed) {
                e.preventDefault();
                return false;
            }
        });
    });
</script>
</body>
</html>
