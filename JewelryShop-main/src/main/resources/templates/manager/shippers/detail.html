<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Shipper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/manager.css}">
</head>

<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{manager/layout/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{manager/layout/header :: header}"></div>

        <main class="p-4 bg-light">
            <div class="container-fluid">
                <a th:href="@{/manager/shippers}" class="btn btn-secondary mb-3">
                    <i class="bi bi-arrow-left"></i> Quay lại danh sách
                </a>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <h5 class="fw-bold text-primary mb-3">
                            <i class="bi bi-person-badge me-2"></i> Thông tin Shipper
                        </h5>
                        <p><strong>Tên:</strong> <span th:text="${shipper.name}"></span></p>
                        <p><strong>SĐT:</strong> <span th:text="${shipper.phone}"></span></p>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h6 class="fw-bold text-secondary mb-3">
                            <i class="bi bi-box-seam me-2"></i> Đơn hàng đang giao
                        </h6>

                        <table class="table table-bordered align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="o : ${orders}">
                                <td th:text="${o.id}"></td>
                                <td th:text="${o.user.fullName}"></td>
                                <td th:text="${o.status}"></td>
                                <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="4" class="text-center text-muted py-3">
                                    Không có đơn hàng nào được giao.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="~{manager/layout/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
