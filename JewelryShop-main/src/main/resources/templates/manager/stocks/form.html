<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Chỉnh sửa giao dịch kho' : 'Thêm giao dịch mới'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/manager.css}">
</head>

<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{manager/layout/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div th:replace="~{manager/layout/header :: header}"></div>

        <main class="p-4 bg-light flex-grow-1">
            <h3 class="fw-bold text-primary mb-4"
                th:text="${isEdit} ? 'Chỉnh sửa giao dịch kho' : 'Thêm giao dịch mới'"></h3>

            <!-- ⚡ Thông báo thành công / lỗi -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/manager/stocks/save}" th:object="${movement}" method="post"
                  class="card p-4 shadow-sm bg-white border-0 mt-3">

                <input type="hidden" th:field="*{id}">

                <!-- Sản phẩm -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Sản phẩm</label>
                    <select class="form-select" th:field="*{product.id}" required>
                        <option value="">-- Chọn sản phẩm --</option>
                        <option th:each="p : ${products}"
                                th:value="${p.id}"
                                th:text="${p.displayName}"
                                th:selected="${movement.product != null and movement.product.id == p.id}">
                        </option>
                    </select>
                </div>

                <!-- Loại giao dịch -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Loại giao dịch</label>
                    <select class="form-select" th:field="*{changeType}" required>
                        <option value="">-- Chọn loại --</option>
                        <option th:value="IMPORT">Nhập kho</option>
                        <option th:value="SALE">Xuất kho</option>
                        <option th:value="ADJUSTMENT">Điều chỉnh</option>
                    </select>
                </div>

                <!-- Số lượng -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Số lượng</label>
                    <input type="number" min="1" class="form-control" th:field="*{quantity}" required>
                </div>

                <!-- Người thực hiện -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Người thực hiện</label>
                    <select class="form-select" th:field="*{manager.id}" required>
                        <option value="">-- Chọn người quản lý --</option>
                        <option th:each="m : ${managers}"
                                th:value="${m.id}"
                                th:text="${m.fullName + ' (' + m.user.email + ')'}"
                                th:selected="${movement.manager != null and movement.manager.id == m.id}">
                        </option>
                    </select>
                </div>

                <!-- Ghi chú -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Ghi chú</label>
                    <textarea class="form-control" th:field="*{note}" rows="3"
                              placeholder="Thêm ghi chú (tùy chọn)..."></textarea>
                </div>

                <!-- Nút hành động -->
                <div class="d-flex justify-content-end mt-4">
                    <a th:href="@{/manager/stocks}" class="btn btn-secondary me-2">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Lưu
                    </button>
                </div>
            </form>
        </main>

        <div th:replace="~{manager/layout/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
