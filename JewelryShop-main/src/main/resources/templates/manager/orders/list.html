<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/manager.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{manager/layout/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{manager/layout/header :: header}"></div>

        <main class="p-4 bg-light">
            <h4 class="fw-bold text-primary mb-4">
                <i class="bi bi-card-list"></i> Đơn hàng
            </h4>

            <!-- ✅ FORM LỌC THEO NGÀY/THÁNG/NĂM -->
            <form class="row g-2 mb-3 align-items-end" th:action="@{/manager/orders}" method="get">
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Từ ngày</label>
                    <input type="date" name="fromDate" class="form-control" th:value="${fromDate}">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Đến ngày</label>
                    <input type="date" name="toDate" class="form-control" th:value="${toDate}">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-semibold">Tháng</label>
                    <input type="number" min="1" max="12" name="month" class="form-control" th:value="${month}">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-semibold">Năm</label>
                    <input type="number" min="2000" max="2100" name="year" class="form-control" th:value="${year}">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-semibold">Từ khóa</label>
                    <input type="text" name="keyword" class="form-control" placeholder="Tên hoặc SĐT" th:value="${keyword}">
                </div>

                <!-- ✅ Nhóm nút hành động -->
                <div class="col-12 mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">

                    <!-- Cụm bên trái: Lọc & Làm mới -->
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary">
                            <i class="bi bi-search"></i> Lọc
                        </button>
                        <a th:href="@{/admin/orders}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-clockwise"></i> Làm mới
                        </a>
                    </div>

                    <!-- Cụm bên phải: Xuất Excel / PDF -->
                    <div class="d-flex gap-2">
                        <a th:href="@{/manager/orders/export/excel}" class="btn btn-success">
                            <i class="bi bi-file-earmark-excel"></i> Xuất Excel
                        </a>
                        <a th:href="@{/manager/orders/export/pdf}" class="btn btn-danger">
                            <i class="bi bi-file-earmark-pdf"></i> Xuất PDF
                        </a>
                    </div>
                </div>
            </form>

            <!-- ✅ BẢNG ĐƠN HÀNG -->
            <div class="bg-white shadow-sm rounded p-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>Ngày tạo</th>
                        <th>Tổng (₫)</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="o : ${orders}">
                        <td th:text="'ORD-' + ${#numbers.formatInteger(o.id, 3)}"></td>
                        <td>
                            <div th:text="${o.user != null ? o.user.fullName : 'Khách ẩn danh'}"></div>
                            <small class="text-muted" th:text="${o.user != null ? o.user.getPhone() : ''}"></small>
                        </td>
                        <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'POINT', 0, 'COMMA')}"></td>

                        <!-- ✅ Gắn màu trạng thái -->
                        <td>
                            <span th:if="${o.status?.name() == 'PENDING'}" class="badge bg-warning text-dark">Chờ xác nhận</span>
                            <span th:if="${o.status?.name() == 'PAID'}" class="badge bg-primary">Đang xử lý</span>
                            <span th:if="${o.status?.name() == 'SHIPPING'}" class="badge bg-info text-dark">Đang giao</span>
                            <span th:if="${o.status?.name() == 'DELIVERED'}" class="badge bg-success">Đã giao hàng</span>
                            <span th:if="${o.status?.name() == 'COMPLETED'}" class="badge bg-success">Hoàn thành</span>
                            <span th:if="${o.status?.name() == 'CANCELLED'}" class="badge bg-secondary">Đã hủy</span>
                            <span th:if="${o.status?.name() == 'RETURNED'}" class="badge bg-danger">Trả hàng</span>
                            <span th:if="${o.status == null}" class="badge bg-light text-dark">Chưa có</span>
                        </td>

                        <td>
                            <button type="button" class="btn btn-outline-primary btn-sm me-1 btn-view-order"
                                    th:data-id="${o.id}">
                                <i class="bi bi-eye"></i> Xem
                            </button>

                            <a th:href="@{'/manager/orders/edit/' + ${o.id}}"
                               class="btn btn-outline-secondary btn-sm me-1">
                                <i class="bi bi-pencil"></i> Sửa
                            </a>

                            <a th:href="@{'/manager/orders/delete/' + ${o.id}}"
                               onclick="return confirm('Bạn có chắc muốn xóa đơn hàng này?')"
                               class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i> Xóa
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${orders.size() == 0}">
                        <td colspan="6" class="text-center text-muted">Không có đơn hàng nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- ✅ PHÂN TRANG -->
            <div class="d-flex justify-content-center mt-3">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${(currentPage ?: 1) == 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/manager/orders(
                               page=${(currentPage ?: 1) - 1},
                               keyword=${keyword},
                               fromDate=${fromDate},
                               toDate=${toDate},
                               month=${month},
                               year=${year}
                           )}">«</a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${i == (currentPage ?: 1)} ? 'active'">
                        <a class="page-link"
                           th:href="@{/manager/orders(
                               page=${i},
                               keyword=${keyword},
                               fromDate=${fromDate},
                               toDate=${toDate},
                               month=${month},
                               year=${year}
                           )}"
                           th:text="${i}"></a>
                    </li>

                    <li class="page-item" th:classappend="${(currentPage ?: 1) == totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/manager/orders(
                               page=${(currentPage ?: 1) + 1},
                               keyword=${keyword},
                               fromDate=${fromDate},
                               toDate=${toDate},
                               month=${month},
                               year=${year}
                           )}">»</a>
                    </li>
                </ul>
            </div>
        </main>

        <footer th:replace="~{manager/layout/footer :: footer}"></footer>
    </div>
</div>

<!-- ✅ Modal chi tiết đơn hàng -->
<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="bi bi-info-circle me-2"></i> Chi tiết đơn hàng
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="orderDetailContent">
                <div class="text-center text-muted py-4">Đang tải dữ liệu...</div>
            </div>
        </div>
    </div>
</div>

<!-- ✅ JS: Load chi tiết đơn hàng -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const modal = new bootstrap.Modal(document.getElementById("orderDetailModal"));
        const modalBody = document.getElementById("orderDetailContent");

        document.querySelectorAll(".btn-view-order").forEach(btn => {
            btn.addEventListener("click", function() {
                const id = this.getAttribute("data-id");
                modalBody.innerHTML = '<div class="text-center text-muted py-4">Đang tải dữ liệu...</div>';
                modal.show();

                fetch(`/manager/orders/detail/${id}`)
                    .then(res => res.text())
                    .then(html => modalBody.innerHTML = html)
                    .catch(() => {
                        modalBody.innerHTML = '<div class="text-danger text-center py-5">Lỗi khi tải dữ liệu!</div>';
                    });
            });
        });
    });
</script>
<div th:replace="~{manager/layout/manager-chat-sidebar :: chat-sidebar}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
