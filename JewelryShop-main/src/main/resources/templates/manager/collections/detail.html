<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="detailModal(c)">
    <div class="modal fade" th:id="'detailModal' + ${c.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-collection me-2"></i>
                        Bộ sưu tập: <span th:text="${c.name}"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="d-flex mb-3">
                        <img th:src="@{${c.imageUrl}}" class="rounded shadow-sm"
                             style="width:150px; height:150px; object-fit:cover;">
                        <div class="ms-3">
                            <p><strong>Tổng sản phẩm:</strong>
                                <span th:text="${c.products != null ? c.products.size() : 0}"></span>
                            </p>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-2">Danh sách sản phẩm</h6>
                    <div th:if="${c.products != null and !c.products.isEmpty()}">
                        <ul class="list-group">
                            <li class="list-group-item d-flex justify-content-between align-items-center"
                                th:each="p : ${c.products}">
                                <!-- ✅ Hiển thị displayName thay vì name -->
                                <span th:text="${p.displayName}"></span>
                                <span class="badge bg-primary rounded-pill"
                                      th:text="${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></span>
                            </li>
                        </ul>
                    </div>

                    <div th:if="${c.products == null or c.products.isEmpty()}"
                         class="text-muted fst-italic">
                        Chưa có sản phẩm nào trong bộ sưu tập này.
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
