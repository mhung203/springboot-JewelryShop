<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Chỉnh sửa bộ sưu tập' : 'Thêm bộ sưu tập'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/manager.css}">
</head>

<body>
<div class="d-flex">
    <!-- ✅ Sidebar -->
    <div th:replace="~{manager/layout/sidebar :: sidebar}"></div>

    <!-- ✅ Main content -->
    <div class="main-content">
        <!-- ✅ Header -->
        <div th:replace="~{manager/layout/header :: header}"></div>

        <main class="p-4 bg-light flex-grow-1">
            <div class="card shadow-sm p-4 border-0">
                <h4 class="fw-bold text-primary mb-4"
                    th:text="${isEdit} ? 'Chỉnh sửa bộ sưu tập' : 'Thêm bộ sưu tập'"></h4>

                <form th:action="@{/manager/collections/save}"
                      th:object="${collection}"
                      method="post"
                      enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}"/>

                    <!-- ✅ Tên bộ sưu tập -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên bộ sưu tập</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               placeholder="Nhập tên bộ sưu tập"
                               required>
                    </div>

                    <!-- ✅ Ảnh đại diện -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ảnh đại diện</label>
                        <input type="file" name="imageFile" class="form-control">
                        <div class="mt-2" th:if="*{imageUrl}">
                            <img th:src="@{*{imageUrl}}"
                                 alt="Preview"
                                 style="width:150px; height:150px; object-fit:cover; border-radius:10px;">
                        </div>
                    </div>

                    <!-- ✅ Danh sách sản phẩm -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Chọn sản phẩm thuộc bộ sưu tập</label>
                        <div class="border rounded p-2" style="max-height: 300px; overflow-y: auto;">
                            <div class="form-check" th:each="p : ${products}">
                                <input class="form-check-input"
                                       type="checkbox"
                                       name="productIds"
                                       th:value="${p.id}"
                                       th:checked="${collection.products != null and collection.products.contains(p)}">
                                <label class="form-check-label">
                                    <!-- ✅ Hiển thị displayName -->
                                    <span th:text="${p.displayName}"></span>
                                    <small class="text-muted"
                                           th:text="'(Giá: ' + ${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'COMMA')} + '₫)'"></small>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- ✅ Nút hành động -->
                    <div class="d-flex justify-content-end">
                        <a th:href="@{/manager/collections}" class="btn btn-secondary me-2">
                            <i class="bi bi-arrow-left"></i> Hủy
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Lưu
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <!-- ✅ Footer -->
        <div th:replace="~{manager/layout/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
