<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Chỉnh sửa nhà cung cấp' : 'Thêm nhà cung cấp mới'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
<div class="d-flex">
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{admin/layout/header :: header}"></div>

        <main class="p-4 bg-light flex-grow-1">
            <h3 class="mb-4 text-primary fw-bold"
                th:text="${isEdit} ? 'Chỉnh sửa nhà cung cấp' : 'Thêm nhà cung cấp mới'"></h3>

            <form th:action="@{/admin/suppliers/save}" th:object="${supplier}"
                  method="post" class="card p-4 shadow-sm bg-white border-0">

                <!-- ✅ Token CSRF để tránh lỗi 403 -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tên nhà cung cấp <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="example@domain.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Số điện thoại</label>
                    <input type="text" th:field="*{phone}" class="form-control" placeholder="Nhập số điện thoại">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Địa chỉ</label>
                    <input type="text" th:field="*{address}" class="form-control" placeholder="Nhập địa chỉ">
                </div>

                <div class="text-end border-top pt-3 mt-4">
                    <a th:href="@{/admin/suppliers}" class="btn btn-secondary me-2">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save"></i>
                        <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
                    </button>
                </div>
            </form>
        </main>

        <div th:replace="~{admin/layout/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
