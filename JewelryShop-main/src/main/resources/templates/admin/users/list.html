<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Quản lý người dùng</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS tùy chỉnh -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="flex-grow-1 d-flex flex-column min-vh-100">

<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{admin/layout/header :: header}"></div>

        <!-- Content -->
        <main class="p-4 flex-grow-1">
            <h2 class="fw-bold mb-4 text-primary"><i class="bi bi-people-fill me-2"></i>Người dùng</h2>

            <!-- Bộ lọc -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <form class="d-flex gap-2 flex-wrap" th:action="@{/admin/users}" method="get">
                    <input type="text" name="keyword" class="form-control"
                           th:value="${keyword}" placeholder="🔍 Tìm theo tên hoặc email...">

                    <select name="role" class="form-select w-auto">
                        <option value="">-- Vai trò --</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}"
                                th:selected="${r.name() == selectedRole}">
                        </option>
                    </select>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i> Tìm
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i> Reset
                    </a>
                </form>

                <a th:href="@{/admin/users/form}" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Thêm người dùng
                </a>
            </div>

            <!-- Bảng người dùng -->
            <div class="table-responsive bg-white shadow-sm rounded">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="text-center">STT</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Giới tính</th>
                        <th>Ngày sinh</th>
                        <th>Vai trò</th>
                        <th>Ngày tạo</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u, stat : ${users}">
                        <td class="text-center" th:text="${stat.count}"></td>
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.gender}"></td>
                        <td th:text="${#temporals.format(u.dateOfBirth, 'dd/MM/yyyy')}"></td>

                        <!-- Vai trò có màu -->
                        <td>
                            <span class="badge text-white px-3 py-2"
                                  th:classappend="${u.role == 'ADMIN'} ? ' bg-danger' :
                                                  (u.role == 'MANAGER' ? ' bg-warning text-dark' : ' bg-info')"
                                  th:text="${u.role}">
                            </span>
                        </td>

                        <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                        <td class="text-center">
                            <a th:href="@{'/admin/users/form/' + ${u.id}}"
                               class="btn-action edit"
                               title="Chỉnh sửa">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{'/admin/users/delete/' + ${u.id}}"
                               class="btn-action delete"
                               onclick="return confirm('Bạn có chắc muốn xóa người dùng này?')"
                               title="Xóa">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${users.size() == 0}">
                        <td colspan="8" class="text-center text-muted py-3">
                            <i class="bi bi-exclamation-circle"></i> Không có người dùng nào
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="d-flex justify-content-center mt-4">
                <nav>
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword}, role=${selectedRole})}">«</a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${i}, keyword=${keyword}, role=${selectedRole})}"
                               th:text="${i}"></a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword}, role=${selectedRole})}">»</a>
                        </li>
                    </ul>
                </nav>
            </div>

        </main>

        <!-- Footer -->
        <div th:replace="~{admin/layout/footer :: footer}"></div>
    </div>
</div>
<div th:replace="~{admin/layout/admin-chat-sidebar :: chat-sidebar}"></div>
<!-- Script -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
