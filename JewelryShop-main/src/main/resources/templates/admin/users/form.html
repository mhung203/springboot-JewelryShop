<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id} != null ? 'Chỉnh sửa người dùng' : 'Thêm người dùng mới'">Quản lý người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        /* ép tất cả input, select, date cùng chiều cao */
        input.form-control, select.form-select, textarea.form-control {
            height: 45px !important;
        }
        textarea.form-control {
            height: auto !important; /* cho phần địa chỉ */
        }
    </style>
</head>

<body class="main-content">
<div th:replace="admin/layout/header :: header"></div>

<div class="d-flex flex-grow-1">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>

    <main class="flex-grow-1 p-4 bg-light">
        <h3 class="mb-4 text-primary fw-bold"
            th:text="${user.id} != null ? 'Chỉnh sửa người dùng' : 'Thêm người dùng mới'"></h3>

        <form th:action="@{/admin/users/save}" th:object="${user}"
              method="post" class="card p-4 shadow-sm bg-white border-0">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}"/>

            <!-- Tất cả trường nằm trong cùng row -->
            <div class="row row-cols-md-2 g-3 align-items-center">

                <!-- Họ tên -->
                <div class="col">
                    <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:field="*{fullName}" placeholder="Nhập họ tên" required>
                </div>

                <!-- Email -->
                <div class="col">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control"
                           th:field="*{email}" placeholder="Nhập email" required>
                </div>

                <!-- Số điện thoại -->
                <div class="col">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" class="form-control"
                           th:field="*{phone}" placeholder="Nhập số điện thoại">
                </div>

                <!-- Giới tính -->
                <div class="col">
                    <label class="form-label">Giới tính</label>
                    <select class="form-select" th:field="*{gender}">
                        <option value="">-- Chọn giới tính --</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <!-- Ngày sinh -->
                <div class="col">
                    <label class="form-label">Ngày sinh</label>
                    <input type="date" class="form-control" th:field="*{dateOfBirth}">
                </div>

                <!-- Vai trò -->
                <div class="col">
                    <label class="form-label">Vai trò</label>
                    <select class="form-select" th:field="*{role}">
                        <option th:each="r : ${roles}"
                                th:if="${r != 'GUEST'}"
                                th:value="${r}"
                                th:text="${r}"></option>
                    </select>
                </div>

                <!-- Địa chỉ -->
                <div class="col-12">
                    <label class="form-label">Địa chỉ</label>
                    <textarea class="form-control" th:field="*{address}" rows="2"
                              placeholder="Nhập địa chỉ"></textarea>
                </div>

                <!-- Mật khẩu -->
                <th:block th:if="${user.id == null}">
                    <div class="col">
                        <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" class="form-control"
                               th:field="*{passwordHash}" placeholder="Nhập mật khẩu" required>
                        <small class="text-muted">Mật khẩu sẽ được mã hóa trước khi lưu</small>
                    </div>
                </th:block>

                <th:block th:if="${user.id != null}">
                    <div class="col">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" class="form-control"
                               name="newPassword" placeholder="Để trống nếu không đổi">
                        <small class="text-muted">Chỉ nhập nếu muốn thay đổi mật khẩu</small>
                    </div>
                </th:block>
            </div>

            <div class="text-end mt-4">
                <a th:href="@{/admin/users}" class="btn btn-secondary me-2">← Quay lại</a>
                <button type="submit" class="btn btn-primary px-4"
                        th:text="${user.id} != null ? 'Cập nhật' : 'Thêm mới'"></button>
            </div>
        </form>
    </main>
</div>

<div th:replace="admin/layout/footer :: footer"></div>
</body>
</html>
