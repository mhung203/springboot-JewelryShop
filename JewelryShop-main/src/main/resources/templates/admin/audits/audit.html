<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhật ký hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

    <!-- Nội dung chính -->
    <div class="main-content">
        <!-- Header -->
        <div th:replace="~{admin/layout/header :: header}"></div>

        <main class="p-4 bg-light">
            <div class="container-fluid">

                <!-- 🔹 Tiêu đề + Bộ lọc -->
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                    <h4 class="fw-bold text-primary mb-3 mb-md-0">
                        <i class="bi bi-clipboard-data me-2"></i> Nhật ký hệ thống
                    </h4>

                    <!-- 🔍 Bộ lọc theo ngày -->
                    <form method="get" th:action="@{/admin/audits}" class="d-flex align-items-center">
                        <input type="date" name="startDate" class="form-control form-control-sm me-2"
                               th:value="${startDate}" style="max-width: 160px;">
                        <span class="me-2">–</span>
                        <input type="date" name="endDate" class="form-control form-control-sm me-2"
                               th:value="${endDate}" style="max-width: 160px;">
                        <button type="submit" class="btn btn-filter me-2">
                            <i class="bi bi-filter"></i> Lọc
                        </button>
                        <a th:href="@{/admin/audits}" class="btn btn-reset">
                            <i class="bi bi-arrow-clockwise"></i> Tất cả
                        </a>
                    </form>

                </div>

                <!-- 🔸 Bảng log -->
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Người thực hiện</th>
                                    <th>Vai trò</th>
                                    <th>Hành động</th>
                                    <th>Chi tiết</th>
                                    <th>Thời gian</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="a, i : ${audits}">
                                    <td th:text="${(currentPage - 1) * 10 + i.index + 1}" class="text-center fw-bold"></td>
                                    <td th:text="${a.adminName}"></td>
                                    <td>
                                        <span th:text="${a.role}"
                                              th:classappend="${a.role == 'ADMIN' ? 'badge bg-danger' :
                                                               a.role == 'MANAGER' ? 'badge bg-warning text-dark' :
                                                               'badge bg-secondary'}"></span>
                                    </td>
                                    <td th:text="${a.action}" class="fw-semibold text-primary"></td>
                                    <td th:text="${a.details}"></td>
                                    <td th:text="${#temporals.format(a.time, 'dd/MM/yyyy HH:mm:ss')}"></td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(audits)}">
                                    <td colspan="6" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox fs-1 mb-2 d-block"></i>
                                        Không có dữ liệu trong khoảng thời gian này
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- 🔸 Phân trang -->
                        <div class="d-flex justify-content-center align-items-center p-3 border-top bg-white"
                             th:if="${totalPages > 1}">
                            <nav>
                                <ul class="pagination mb-0">
                                    <!-- Nút « -->
                                    <li class="page-item" th:classappend="${currentPage == 1}? 'disabled'">
                                        <a class="page-link"
                                           th:href="@{/admin/audits(page=${currentPage - 1}, startDate=${startDate}, endDate=${endDate})}">
                                            «
                                        </a>
                                    </li>

                                    <!-- Các số trang -->
                                    <li class="page-item"
                                        th:each="pageNum : ${#numbers.sequence(1,totalPages)}"
                                        th:classappend="${pageNum == currentPage}? 'active'">
                                        <a class="page-link"
                                           th:href="@{/admin/audits(page=${pageNum}, startDate=${startDate}, endDate=${endDate})}"
                                           th:text="${pageNum}">
                                        </a>
                                    </li>

                                    <!-- Nút » -->
                                    <li class="page-item" th:classappend="${currentPage == totalPages}? 'disabled'">
                                        <a class="page-link"
                                           th:href="@{/admin/audits(page=${currentPage + 1}, startDate=${startDate}, endDate=${endDate})}">
                                            »
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <div th:replace="~{admin/layout/footer :: footer}"></div>
    </div>
</div>
<div th:replace="~{admin/layout/admin-chat-sidebar :: chat-sidebar}"></div>
<!-- Script -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
