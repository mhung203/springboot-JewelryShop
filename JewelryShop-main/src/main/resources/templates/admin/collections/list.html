<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách bộ sưu tập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
<div class="d-flex">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="admin/layout/header :: header"></div>

        <main class="p-4 bg-light flex-grow-1">
            <div class="d-flex justify-content-between mb-3 align-items-center">
                <h4 class="fw-bold text-primary mb-0"><i class="bi bi-collection"></i> Bộ sưu tập</h4>

                <form th:action="@{/admin/collections}" method="get" class="d-flex">
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm..."
                           class="form-control me-2">
                    <button class="btn btn-outline-primary" type="submit"><i class="bi bi-search"></i></button>
                </form>

                <a th:href="@{/admin/collections/form}" class="btn btn-success ms-3">
                    <i class="bi bi-plus-circle"></i> Thêm bộ sưu tập
                </a>
            </div>

            <div class="bg-white rounded shadow-sm p-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Tên bộ sưu tập</th>
                        <th>Hình đại diện</th>
                        <th>Sản phẩm</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, stat : ${collections}">
                        <td th:text="${stat.index + 1 + (currentPage - 1) * 5}"></td>
                        <td th:text="${c.name}"></td>
                        <td>
                            <img th:src="@{${c.imageUrl}}" alt="image"
                                 style="width:70px; height:70px; border-radius:10px; object-fit:cover;">
                        </td>
                        <td th:text="${c.products != null ? c.products.size() : 0}"></td>
                        <td class="text-center">
                            <button class="btn btn-outline-primary btn-sm me-1"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#detailModal' + ${c.id}">
                                <i class="bi bi-eye"></i>
                            </button>
                            <a th:href="@{'/admin/collections/form/' + ${c.id}}" class="btn btn-outline-warning btn-sm me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{'/admin/collections/delete/' + ${c.id}}"
                               onclick="return confirm('Xóa bộ sưu tập này?')"
                               class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${collections.size() == 0}">
                        <td colspan="5" class="text-center text-muted py-3">Không có bộ sưu tập nào</td>
                    </tr>
                    </tbody>
                </table>

                <!-- ✅ Phân trang -->
                <nav th:if="${totalPages > 1}" class="mt-3">
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{|/admin/collections?page=${currentPage - 1}|}">Trước</a>
                        </li>

                        <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                            class="page-item"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{|/admin/collections?page=${i}|}"
                               th:text="${i}"></a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{|/admin/collections?page=${currentPage + 1}|}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- ✅ Modal chi tiết -->
            <div th:if="${collections != null}" th:each="c : ${collections}">
                <div th:replace="~{admin/collections/detail :: detailModal(c=${c})}"></div>
            </div>
        </main>

        <div th:replace="~{admin/layout/footer :: footer}"></div>
    </div>
</div>
<div th:replace="~{admin/layout/admin-chat-sidebar :: chat-sidebar}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
