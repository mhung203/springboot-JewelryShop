<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Shipper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{admin/layout/header :: header}"></div>

        <main class="p-4 bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                <h4 class="fw-bold text-primary mb-3 mb-md-0">
                    <i class="bi bi-truck me-2"></i> Danh sách Shipper
                </h4>

                <button class="btn btn-success d-flex align-items-center" data-bs-toggle="modal"
                        data-bs-target="#addShipperModal">
                    <i class="bi bi-plus-circle me-1"></i> Thêm Shipper
                </button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Tên Shipper</th>
                            <th>Số điện thoại</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s, i : ${shippers}">
                            <td th:text="${(currentPage - 1) * 5 + i.index + 1}"></td>
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.phone}"></td>
                            <td>
                                <a th:href="@{'/admin/shippers/' + ${s.id}}" class="btn btn-sm btn-primary me-2">
                                    <i class="bi bi-eye"></i> Xem
                                </a>
                                <a th:href="@{'/admin/shippers/delete/' + ${s.id}}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('Xóa shipper này?')">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(shippers)}">
                            <td colspan="4" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-1 mb-2 d-block"></i>
                                Không có shipper nào.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 🔸 PHÂN TRANG -->
                <div class="d-flex justify-content-center align-items-center p-3 border-top bg-white"
                     th:if="${totalPages > 1}">
                    <nav>
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${currentPage == 1}? 'disabled'">
                                <a class="page-link" th:href="@{'/admin/shippers?page=' + (${currentPage} - 1)}">«</a>
                            </li>

                            <li class="page-item"
                                th:each="p : ${#numbers.sequence(1, totalPages)}"
                                th:classappend="${p == currentPage}? 'active'">
                                <a class="page-link" th:href="@{'/admin/shippers?page=' + ${p}}" th:text="${p}"></a>
                            </li>

                            <li class="page-item" th:classappend="${currentPage == totalPages}? 'disabled'">
                                <a class="page-link" th:href="@{'/admin/shippers?page=' + (${currentPage} + 1)}">»</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </main>

        <div th:replace="~{admin/layout/footer :: footer}"></div>
    </div>
</div>

<!-- Modal thêm shipper -->
<div class="modal fade" id="addShipperModal" tabindex="-1" aria-labelledby="addShipperModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow-sm">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i> Thêm Shipper</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/shippers/save}" method="post" th:object="${shipper}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên Shipper</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control" placeholder="Nhập số điện thoại" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle me-1"></i> Lưu
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{admin/layout/admin-chat-sidebar :: chat-sidebar}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
