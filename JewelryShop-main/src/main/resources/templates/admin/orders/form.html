<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{admin/layout/header :: header}"></div>

        <main class="p-4 bg-light">
            <div class="container">
                <h4 class="fw-bold text-primary mb-4">
                    <i class="bi bi-pencil-square me-2"></i> Cập nhật đơn hàng
                </h4>

                <form th:action="@{/admin/orders/update}" method="post"
                      class="card p-4 shadow-sm border-0">

                    <input type="hidden" name="orderId" th:value="${order.id}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mã đơn hàng</label>
                        <input type="text" th:value="${order.id}" class="form-control" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Trạng thái đơn hàng</label>
                        <select class="form-select" name="status" id="statusSelect" onchange="handleStatusChange()">
                            <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">Chờ xác nhận</option>
                            <option value="PAID" th:selected="${order.status.name() == 'PAID'}">Đang xử lý</option>
                            <option value="SHIPPING" th:selected="${order.status.name() == 'SHIPPING'}">Đang giao</option>
                            <option value="DELIVERED" th:selected="${order.status.name() == 'DELIVERED'}">Đã giao hàng</option>
                            <option value="COMPLETED" th:selected="${order.status.name() == 'COMPLETED'}">Hoàn thành</option>
                            <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">Đã hủy</option>
                            <option value="RETURNED" th:selected="${order.status.name() == 'RETURNED'}">Trả hàng</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phân công Shipper</label>
                        <select class="form-select" name="shipperId">
                            <option value="0">-- Chưa gán --</option>
                            <option th:each="s : ${shippers}"
                                    th:value="${s.id}"
                                    th:text="${s.name}"
                                    th:selected="(${order.shipper} != null AND ${order.shipper.id} == ${s.id})">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Thanh toán</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="paid" id="paidCheck" value="true"
                                   th:checked="${order.paid}"
                                   onchange="togglePaidStatus(this)">
                            <label class="form-check-label" for="paidCheck">Đã thanh toán</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tổng tiền</label>
                        <input type="text"
                               th:value="${#numbers.formatDecimal(order.totalAmount, 0, 'POINT', 0, 'COMMA')} + ' ₫'"
                               class="form-control" disabled>

                    </div>

                    <div class="text-end">
                        <a th:href="@{/admin/orders}" class="btn btn-secondary me-2">
                            <i class="bi bi-arrow-left"></i> Quay lại
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> Cập nhật
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <div th:replace="~{admin/layout/footer :: footer}"></div>
    </div>
</div>
<script>
    const statusSelect = document.getElementById("statusSelect");
    const paidCheck = document.getElementById("paidCheck");

    function togglePaidStatus(checkbox) {
        if (checkbox.checked) {
            if (statusSelect.value === "PENDING" || statusSelect.value === "CANCELLED") {
                statusSelect.value = "PAID";
            }
        } else {
            if (statusSelect.value === "PAID") {
                statusSelect.value = "PENDING";
            }
        }
    }

    function handleStatusChange() {
        const value = statusSelect.value;
        if (value === "CANCELLED" || value === "PENDING") {
            paidCheck.checked = false;
        } else if (value === "PAID" || value === "SHIPPING" || value === "DELIVERED" || value === "COMPLETED") {
            paidCheck.checked = true;
        }
    }
</script>
</body>
</html>
